<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Canvas — Digit Detector</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        <div class="nav-container">
            <a href="{{ url_for('home') }}" class="nav-logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="M12 6v6l4 2"/></svg>
                DigitDetector
            </a>
            <nav>
                <a href="{{ url_for('home') }}" id="nav-home">Home</a>
                <a href="{{ url_for('canvas') }}" id="nav-canvas" class="active">Canvas</a>
                <a href="{{ url_for('analysis') }}" id="nav-analysis">ML Analysis</a>
            </nav>
        </div>
    </header>
    
    <main>
        <div class="canvas-section fade-in">
            <div class="card canvas-card">
                <!-- Drawing Canvas Container -->
                <div class="canvas-container" role="img" aria-label="Digit drawing board">
                    <canvas id="digit-canvas" width="280" height="280"></canvas>
                    
                    <!-- Loading overlay spinner -->
                    <div id="canvas-loader" class="canvas-loader">
                        <div class="spinner"></div>
                        <span class="loader-text">Analyzing stroke gradients...</span>
                    </div>
                </div>

                <!-- Drawing Action Buttons -->
                <div class="canvas-controls">
                    <button id="clear-btn" class="btn btn-secondary" aria-label="Clear drawing canvas">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
                        Clear
                    </button>
                    <button id="predict-btn" class="btn btn-accent" aria-label="Predict drawn digit">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
                        Predict
                    </button>
                </div>

                <!-- Classification Feedback Blocks -->
                <div class="prediction-card-section">
                    <div class="prediction-block">
                        <div class="pred-title">Prediction</div>
                        <div id="pred-digit" class="pred-digit">—</div>
                    </div>
                    <div class="prediction-block" style="text-align: left;">
                        <div class="pred-title">Confidence</div>
                        <span id="pred-percent" class="pred-percent">—</span>
                        <div class="progress-bar-container">
                            <div id="progress-bar-fill" class="progress-bar-fill"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="{{ url_for('static', filename='canvas.js') }}"></script>
</body>
</html>
